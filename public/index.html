<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning des tâches — CHV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Charpentiers Hautvar — Bureau d'études</div>
    <h1>Planning des tâches</h1>
    <div class="sub">Extrait automatiquement de tes comptes rendus de réunion planning (Plaud AI) — partagé en direct avec l'équipe</div>
  </div>
  <div>
    <div class="upload-zone">
      <input type="file" id="fileInput" accept=".txt,.pdf" />
      <button class="btn primary" id="uploadBtn">📥 Importer un compte rendu</button>
      <button class="btn ghost" id="clearDoneBtn">Effacer les terminées</button>
    </div>
    <div id="status"></div>
  </div>
</header>

<div class="view-switch" id="viewSwitch">
  <button class="view-btn active" data-view="priority">Par priorité</button>
  <button class="view-btn" data-view="person">Par personne</button>
  <button class="view-btn" data-view="chantier">Par chantier</button>
</div>

<div class="pegboard" id="pegboard">
  <div class="peg-tag" data-cat="Atelier">🪚 Atelier</div>
  <div class="peg-tag" data-cat="Étude">✏️ Étude</div>
  <div class="peg-tag" data-cat="Commande/Matériel">📦 Commande/Matériel</div>
  <div class="peg-tag" data-cat="Livraison">🚚 Livraison</div>
  <div class="peg-tag" data-cat="Grue/Levage">🏗️ Grue/Levage</div>
  <div class="peg-tag" data-cat="Bureau">📋 Bureau</div>
</div>

<div class="board" id="board"></div>

<footer>
  <span id="taskCount"></span>
  <span id="liveIndicator" class="live-dot" title="Connecté en direct">●</span>
</footer>

<script src="/script.js"></script>
</body>
</html>
